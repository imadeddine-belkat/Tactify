syntax = "proto3";

package fpl.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/imadeddine-belkat/tactify-protos/go/fpl/v1;fplv1";

// =============================================================================
// Bootstrap & Core
// =============================================================================

message BootstrapResponse {
  repeated Event events = 1;
  GameSettings game_settings = 2;
  repeated Phase phases = 3;
  repeated Team teams = 4;
  int32 total_players = 5;
  repeated PlayerBootstrap elements = 6;
  repeated ElementStat element_stats = 7;
  repeated ElementType element_types = 8;
}

message Team {
  int32 id = 1;
  int32 code = 2;
  string name = 3;
  string short_name = 4;

  int32 strength = 5;
  optional string form = 6; // Pointer in Go implies optional/nullable
  int32 position = 7;
  int32 points = 8;
  int32 played = 9;
  int32 win = 10;
  int32 draw = 11;
  int32 loss = 12;

  optional int32 team_division = 13; // Pointer in Go
  bool unavailable = 14;
  int32 pulse_id = 15;

  int32 strength_overall_home = 16;
  int32 strength_overall_away = 17;
  int32 strength_attack_home = 18;
  int32 strength_attack_away = 19;
  int32 strength_defence_home = 20;
  int32 strength_defence_away = 21;
}

message Chip {
  string name = 1;
  int32 num_played = 2;
}

message Phase {
  int32 id = 1;
  string name = 2;
  int32 start_event = 3;
  int32 stop_event = 4;
}

message ElementStat {
  string label = 1;
  string name = 2;
}

message ElementType {
  int32 id = 1;
  string singular_name = 2;
  string plural_name = 3;
  string singular_name_short = 4;
  string plural_name_short = 5;

  int32 squad_select = 6;
  optional int32 squad_min_select = 7;
  optional int32 squad_max_select = 8;
  int32 squad_min_play = 9;
  int32 squad_max_play = 10;

  bool ui_shirt_specific = 11;
  repeated int32 sub_positions_locked = 12;
  int32 element_count = 13;
}

// =============================================================================
// Fixtures
// =============================================================================

message Fixture {
  int32 id = 1;
  int32 code = 2;
  int32 event = 3;
  bool finished = 4;
  bool finished_provisional = 5;
  string kickoff_time = 6;
  int32 minutes = 7;
  bool provisional_start_time = 8;
  bool started = 9;
  int32 team_a = 10;
  int32 team_a_score = 11;
  int32 team_h = 12;
  int32 team_h_score = 13;
  repeated FixtureStat stats = 14;
  int32 team_h_difficulty = 15;
  int32 team_a_difficulty = 16;
  int32 pulse_id = 17;
}

message FixtureStat {
  string identifier = 1;
  repeated StatElement a = 2;
  repeated StatElement h = 3;
}

message StatElement {
  int32 value = 1;
  int32 element = 2;
}

// =============================================================================
// Game Settings
// =============================================================================

message GameSettings {
  int32 league_join_private_max = 1;
  int32 league_join_public_max = 2;
  int32 league_max_size_public_classic = 3;
  int32 league_max_size_public_h2h = 4;
  int32 league_max_size_private_h2h = 5;
  int32 league_max_ko_rounds = 6;
  string league_prefix_public = 7;
  int32 league_points_h2h_win = 8;
  int32 league_points_h2h_lose = 9;
  int32 league_points_h2h_draw = 10;
  bool league_ko_first_instead_of_random = 11;
  int32 cup_start_event_id = 12;
  int32 cup_stop_event_id = 13;
  string cup_qualifying_method = 14;
  string cup_type = 15;
  int32 squad_squadplay = 16;
  int32 squad_squadsize = 17;
  int32 squad_team_limit = 18;
  int32 squad_total_spend = 19;
  int32 ui_currency_multiplier = 20;
  bool ui_use_special_shirts = 21;
  repeated google.protobuf.Value ui_special_shirt_exclusions = 22;
  int32 stats_form_days = 23;
  bool sys_vice_captain_enabled = 24;
  int32 transfers_cap = 25;
  double transfers_sell_on_fee = 26;
  int32 max_budget = 27;
}

message Scoring {
  int32 long_play = 1;
  int32 short_play = 2;
  map<string, int32> goals_conceded = 3;
  int32 saves = 4;
  map<string, int32> goals_scored = 5;
  int32 assists = 6;
  map<string, int32> clean_sheets = 7;
  int32 penalties_saved = 8;
  int32 penalties_missed = 9;
  int32 yellow_cards = 10;
  int32 red_cards = 11;
  int32 own_goals = 12;
  int32 bonus = 13;
  int32 bps = 14;
  int32 influence = 15;
  int32 creativity = 16;
  int32 threat = 17;
  int32 ict_index = 18;
  int32 special_multiplier = 19;
  int32 tackles = 20;
  int32 cbi = 21;
  int32 recoveries = 22;
  map<string, int32> defensive_contribution = 23;
  map<string, int32> mng_goals_scored = 24;
  map<string, int32> mng_clean_sheets = 25;
  map<string, int32> mng_win = 26;
  map<string, int32> mng_draw = 27;
  int32 mng_loss = 28;
  map<string, int32> mng_underdog_win = 29;
  map<string, int32> mng_underdog_draw = 30;
  int32 starts = 31;
  int32 expected_assists = 32;
  int32 expected_goal_involvements = 33;
  int32 expected_goals_conceded = 34;
  int32 expected_goals = 35;
}

// =============================================================================
// Gameweek (Event)
// =============================================================================

message Event {
  int32 id = 1;
  string name = 2;
  string deadline_time = 3;
  int32 average_entry_score = 4;
  bool finished = 5;
  bool data_checked = 6;
  int32 highest_score = 7;
  bool is_previous = 8;
  bool is_current = 9;
  bool is_next = 10;
  repeated Chip chip_plays = 11;
  int32 most_selected = 12;
  int32 most_transferred_in = 13;
  int32 top_element = 14;
  TopElementInfo top_element_info = 15;
  int32 transfers_made = 16;
  int32 most_captained = 17;
  int32 most_vice_captained = 18;
}

message TopElementInfo {
  int32 id = 1;
  int32 points = 2;
}

message LiveEvent {
  repeated LiveElement elements = 1;
}

message LiveElement {
  int32 id = 1;
  LiveStats stats = 2;
  repeated ExplainItem explain = 3;
  bool modified = 4;
}

message LiveStats {
  int32 minutes = 1;
  int32 goals_scored = 2;
  int32 assists = 3;
  int32 clean_sheets = 4;
  int32 goals_conceded = 5;
  int32 own_goals = 6;
  int32 penalties_saved = 7;
  int32 penalties_missed = 8;
  int32 yellow_cards = 9;
  int32 red_cards = 10;
  int32 saves = 11;
  int32 bonus = 12;
  int32 bps = 13;

  string influence = 14;
  string creativity = 15;
  string threat = 16;
  string ict_index = 17;

  int32 clearances_blocks_interceptions = 18;
  int32 recoveries = 19;
  int32 tackles = 20;
  int32 defensive_contribution = 21;
  int32 starts = 22;

  string expected_goals = 23;
  string expected_assists = 24;
  string expected_goal_involvements = 25;
  string expected_goals_conceded = 26;

  int32 total_points = 27;
  bool in_dreamteam = 28;
}

message ExplainItem {
  int32 fixture = 1;
  repeated ExplainStatItem stats = 2;
}

message ExplainStatItem {
  string identifier = 1;
  int32 points = 2;
  int32 value = 3;
  int32 points_modification = 4;
}

// =============================================================================
// Manager (Entry)
// =============================================================================

message Entry {
  int32 id = 1;
  string name = 2;
  string player_first_name = 3;
  string player_last_name = 4;
  int32 player_region_id = 5;
  string player_region_name = 6;
  string player_region_iso_code_short = 7;
  string player_region_iso_code_long = 8;
  int32 favourite_team = 9;

  string joined_time = 10;
  int32 started_event = 11;
  int32 years_active = 12;

  int32 summary_overall_points = 13;
  int32 summary_overall_rank = 14;
  int32 summary_event_points = 15;
  int32 summary_event_rank = 16;
  int32 current_event = 17;

  bool name_change_blocked = 18;

  int32 last_deadline_bank = 19;
  int32 last_deadline_value = 20;
  int32 last_deadline_total_transfers = 21;
  string club_badge_src = 22;
}

message EntryEventPicks {
  optional string active_chip = 1;
  repeated AutomaticSub automatic_subs = 2;
  EntryHistoryCurrent entry_history = 3;
  repeated Pick picks = 4;
}

message AutomaticSub {
  int32 entry = 1;
  int32 element_in = 2;
  int32 element_out = 3;
  int32 event = 4;
}

message Pick {
  int32 element = 1;
  int32 position = 2;
  int32 multiplier = 3;
  bool is_captain = 4;
  bool is_vice_captain = 5;
  int32 element_type = 6;
}

message EntryHistory {
  repeated EntryHistoryCurrent current = 1;
  repeated EntryHistoryPast past = 2;
  repeated EntryHistoryChip chips = 3;
}

message EntryHistoryCurrent {
  int32 event = 1;
  int32 points = 2;
  int32 total_points = 3;
  int32 rank = 4;
  int32 rank_sort = 5;
  int32 overall_rank = 6;
  int32 percentile_rank = 7;
  int32 bank = 8;
  int32 value = 9;
  int32 event_transfers = 10;
  int32 event_transfers_cost = 11;
  int32 points_on_bench = 12;
}

message EntryHistoryPast {
  string season_name = 1;
  int32 season_id = 2;
  int32 total_points = 3;
  int32 rank = 4;
}

message EntryHistoryChip {
  string name = 1;
  string time = 2;
  int32 event = 3;
}

message EntryTransfers {
  repeated Transfer transfers = 1;
}

message Transfer {
  int32 entry = 1;
  int32 element_in = 2;
  int32 element_in_cost = 3;
  int32 element_out = 4;
  int32 element_out_cost = 5;
  int32 event = 6;
  google.protobuf.Timestamp time = 7;
}

// =============================================================================
// Player (Elements)
// =============================================================================

message Player {
  repeated PlayerHistory history = 1;
  repeated PlayerPastHistory history_past = 2;
}

message PlayerBootstrap {
  int32 id = 1;
  int32 code = 2;
  string first_name = 3;
  string second_name = 4;
  string web_name = 5;

  int32 team = 6;
  int32 team_code = 7;
  int32 element_type = 8;
  string status = 9;

  bool can_transact = 10;
  bool can_select = 11;
  bool in_dreamteam = 12;
  bool special = 13;
  bool removed = 14;
  bool unavailable = 15;

  int32 now_cost = 16;
  int32 cost_change_event = 17;
  int32 cost_change_event_fall = 18;
  int32 cost_change_start = 19;
  int32 cost_change_start_fall = 20;

  int32 dreamteam_count = 21;

  int32 total_points = 22;
  int32 event_points = 23;
  string points_per_game = 24;
  string form = 25;
  string selected_by_percent = 26;
  string value_form = 27;
  string value_season = 28;

  string photo = 29;
  optional int32 squad_number = 30;
  string birth_date = 31;
  string team_join_date = 32;
  int32 region = 33;
  string opta_code = 34;

  int32 minutes = 35;
  int32 goals_scored = 36;
  int32 assists = 37;
  int32 clean_sheets = 38;
  int32 goals_conceded = 39;
  int32 own_goals = 40;
  int32 penalties_saved = 41;
  int32 penalties_missed = 42;
  int32 yellow_cards = 43;
  int32 red_cards = 44;
  int32 saves = 45;
  int32 bonus = 46;
  int32 bps = 47;

  string influence = 48;
  string creativity = 49;
  string threat = 50;
  string ict_index = 51;

  int32 clearances_blocks_interceptions = 52;
  int32 recoveries = 53;
  int32 tackles = 54;
  int32 defensive_contribution = 55;
  int32 starts = 56;

  string expected_goals = 57;
  string expected_assists = 58;
  string expected_goal_involvements = 59;
  string expected_goals_conceded = 60;

  double expected_goals_per_90 = 61;
  double expected_assists_per_90 = 62;
  double expected_goal_involvements_per_90 = 63;
  double expected_goals_conceded_per_90 = 64;
  double saves_per_90 = 65;
  double goals_conceded_per_90 = 66;
  double starts_per_90 = 67;
  double clean_sheets_per_90 = 68;
  double defensive_contribution_per_90 = 69;

  int32 influence_rank = 70;
  int32 influence_rank_type = 71;
  int32 creativity_rank = 72;
  int32 creativity_rank_type = 73;
  int32 threat_rank = 74;
  int32 threat_rank_type = 75;
  int32 ict_index_rank = 76;
  int32 ict_index_rank_type = 77;

  int32 now_cost_rank = 78;
  int32 now_cost_rank_type = 79;
  int32 form_rank = 80;
  int32 form_rank_type = 81;
  int32 points_per_game_rank = 82;
  int32 points_per_game_rank_type = 83;
  int32 selected_rank = 84;
  int32 selected_rank_type = 85;
}

message PlayersBootstrap {
  repeated PlayerBootstrap elements = 1;
}

// =============================================================================
// Player History
// =============================================================================

message PlayerHistory {
  int32 element = 1;
  int32 fixture = 2;
  int32 opponent_team = 3;
  int32 round = 4;
  string kickoff_time = 5;
  bool was_home = 6;
  int32 total_points = 7;

  int32 team_h_score = 8;
  int32 team_a_score = 9;
  bool modified = 10;

  int32 minutes = 11;
  int32 goals_scored = 12;
  int32 assists = 13;
  int32 clean_sheets = 14;
  int32 goals_conceded = 15;
  int32 own_goals = 16;
  int32 penalties_saved = 17;
  int32 penalties_missed = 18;
  int32 yellow_cards = 19;
  int32 red_cards = 20;
  int32 saves = 21;
  int32 bonus = 22;
  int32 bps = 23;

  string influence = 24;
  string creativity = 25;
  string threat = 26;
  string ict_index = 27;

  int32 clearances_blocks_interceptions = 28;
  int32 recoveries = 29;
  int32 tackles = 30;
  int32 defensive_contribution = 31;
  int32 starts = 32;

  string expected_goals = 33;
  string expected_assists = 34;
  string expected_goal_involvements = 35;
  string expected_goals_conceded = 36;

  int32 value = 37;
  int32 transfers_balance = 38;
  int32 selected = 39;
  int32 transfers_in = 40;
  int32 transfers_out = 41;
}

message PlayerPastHistory {
  int32 element_code = 1;
  int32 season_id = 2;
  string season_name = 3;
  int32 start_cost = 4;
  int32 end_cost = 5;
  int32 total_points = 6;

  int32 minutes = 7;
  int32 goals_scored = 8;
  int32 assists = 9;
  int32 clean_sheets = 10;
  int32 goals_conceded = 11;
  int32 own_goals = 12;
  int32 penalties_saved = 13;
  int32 penalties_missed = 14;
  int32 yellow_cards = 15;
  int32 red_cards = 16;
  int32 saves = 17;
  int32 bonus = 18;
  int32 bps = 19;

  string influence = 20;
  string creativity = 21;
  string threat = 22;
  string ict_index = 23;

  int32 clearances_blocks_interceptions = 24;
  int32 recoveries = 25;
  int32 tackles = 26;
  int32 defensive_contribution = 27;
  int32 starts = 28;

  string expected_goals = 29;
  string expected_assists = 30;
  string expected_goal_involvements = 31;
  string expected_goals_conceded = 32;
}

// =============================================================================
// API Message Wrappers
// =============================================================================

message TeamMessage {
  Team team = 1;
  int32 season_id = 2;
}

message PlayerBootstrapMessage {
  PlayerBootstrap player = 1;
  int32 season_id = 2;
}

message PlayerHistoryMessage {
  int32 player_id = 1;
  int32 season_id = 2;
  repeated PlayerHistory history = 3;
}

message PlayerPastHistoryMessage {
  int32 element_code = 1;
  repeated PlayerPastHistory past_history = 2;
}

message FixtureMessage {
  Fixture fixture = 1;
  int32 season_id = 2;
}

message LiveEventMessage {
  int32 player_id = 1;
  int32 event = 2;
  int32 season_id = 3;
  LiveStats stats = 4;
  repeated ExplainItem explain = 5;
  bool modified = 6;
}

message EntryMessage {
  Entry entry = 1;
  int32 season_id = 2;
}

message EntryEventPicksMessage {
  int32 entry_id = 1;
  int32 event = 2;
  int32 season_id = 3;
  EntryEventPicks picks = 4;
}

message EntryHistoryMessage {
  EntryHistory entry_history = 1;
  int32 entry_id = 2;
  int32 season_id = 3;
}

message EntryTransfersMessage {
  int32 entry_id = 1;
  int32 season_id = 2;
  repeated Transfer transfers = 3;
}