// =============================================================================
// Top Players (Leaderboards)
// =============================================================================

message TopPlayers {
  TopPlayersStats top_players = 1;
}

message TopPlayersStats {
  repeated PlayerLeaderboardItem rating = 1;
  repeated PlayerLeaderboardItem goals = 2;
  repeated PlayerLeaderboardItem assists = 3;
  repeated PlayerLeaderboardItem expected_goals = 4;
  repeated PlayerLeaderboardItem expected_assists = 5;
  repeated PlayerLeaderboardItem goals_assists_sum = 6;
  repeated PlayerLeaderboardItem penalty_goals = 7;
  repeated PlayerLeaderboardItem free_kick_goal = 8;
  repeated PlayerLeaderboardItem scoring_frequency = 9;
  repeated PlayerLeaderboardItem total_shots = 10;
  repeated PlayerLeaderboardItem shots_on_target = 11;
  repeated PlayerLeaderboardItem big_chances_created = 12;
  repeated PlayerLeaderboardItem big_chances_missed = 13;
  repeated PlayerLeaderboardItem accurate_passes = 14;
  repeated PlayerLeaderboardItem key_passes = 15;
  repeated PlayerLeaderboardItem accurate_long_balls = 16;
  repeated PlayerLeaderboardItem successful_dribbles = 17;
  repeated PlayerLeaderboardItem penalties_won = 18;
  repeated PlayerLeaderboardItem tackles = 19;
  repeated PlayerLeaderboardItem interceptions = 20;
  repeated PlayerLeaderboardItem clearances = 21;
  repeated PlayerLeaderboardItem possessions_lost = 22;
  repeated PlayerLeaderboardItem yellow_cards = 23;
  repeated PlayerLeaderboardItem red_cards = 24;
}

message PlayerLeaderboardItem {
  Player player = 1;
  Team team = 2;
  bool played_enough = 3;
  AggregatedStatistics statistics = 4;
}

// =============================================================================
// Top Teams (Leaderboards)
// =============================================================================

message TopTeams {
  repeated TopTeamStatItem avg_rating = 1;
  repeated TopTeamStatItem goals_scored = 2;
  repeated TopTeamStatItem goals_conceded = 3;
  repeated TopTeamStatItem big_chances = 4;
  repeated TopTeamStatItem big_chances_missed = 5;
  repeated TopTeamStatItem hit_wood_work = 6;
  repeated TopTeamStatItem yellow_cards = 7;
  repeated TopTeamStatItem red_cards = 8;
  repeated TopTeamStatItem average_ball_possession = 9;
  repeated TopTeamStatItem accurate_passes = 10;
  repeated TopTeamStatItem accurate_long_balls = 11;
  repeated TopTeamStatItem accurate_crosses = 12;
  repeated TopTeamStatItem shots = 13;
  repeated TopTeamStatItem shots_on_target = 14;
  repeated TopTeamStatItem successful_dribbles = 15;
  repeated TopTeamStatItem tackles = 16;
  repeated TopTeamStatItem interceptions = 17;
  repeated TopTeamStatItem clearances = 18;
  repeated TopTeamStatItem corners = 19;
  repeated TopTeamStatItem fouls = 20;
  repeated TopTeamStatItem penalty_goals = 21;
  repeated TopTeamStatItem penalty_goals_conceded = 22;
  repeated TopTeamStatItem clean_sheets = 23;
}

// Wraps Team and its leaderboard stats (replaces TeamStat[T])
message TopTeamStatItem {
  int32 season_id = 1;
  int32 league_id = 2;
  Team team = 3;
  TeamLeaderboardStatistics statistics = 4;
}

// Unified statistics for leaderboards (Combines Int and Float fields)
message TeamLeaderboardStatistics {
  int32 id = 1;
  int32 matches = 2;
  int32 awarded_matches = 3;

  double avg_rating = 4;
  int32 goals_scored = 5;
  int32 goals_conceded = 6;
  int32 big_chances = 7;
  int32 big_chances_missed = 8;
  int32 hit_wood_work = 9;
  int32 yellow_cards = 10;
  int32 red_cards = 11;
  double avg_ball_possession = 12;
  int32 accurate_passes = 13;
  int32 accurate_long_balls = 14;
  int32 accurate_crosses = 15;
  int32 shots = 16;
  int32 shots_on_target = 17;
  int32 successful_dribbles = 18;
  int32 tackles = 19;
  int32 interceptions = 20;
  int32 clearances = 21;
  int32 corners = 22;
  int32 fouls = 23;
  int32 penalty_goals = 24;
  int32 penalty_goals_conceded = 25;
  int32 clean_sheets = 26;
}


// =============================================================================
// API Message Wrappers
// =============================================================================

message StandingMessage {
  int32 season_id = 1;
  int32 league_id = 2;
  StandingRow row = 3;
}

message PlayerMessage {
  int32 season_id = 1;
  int32 league_id = 2;
  int32 team_id = 3;
  string team_name = 4;
  Player player = 5;
}

message MatchLineupMessage {
  int32 season_id = 1;
  int32 league_id = 2;
  int32 match_id = 3;
  int32 round = 4;
  MatchLineup lineup = 5;
}

message PlayerMatchStatsMessage {
  string player_name = 1;
  int32 season_id = 2;
  int32 league_id = 3;
  int32 match_id = 4;
  int32 round = 5;
  MatchPlayer player = 6;
}

message MatchStatsMessage {
  int32 season_id = 1;
  int32 league_id = 2;
  int32 event_id = 3;
  int32 match_id = 4;
  int32 home_team_id = 5;
  int32 away_team_id = 6;
  string group_name = 7;
  StatsItem statistics = 8;
}

message TeamOverallStatsMessage {
  int32 team_id = 1;
  int32 league_id = 2;
  int32 season_id = 3;
  TeamOverallStats statistics = 4;
}

message TopTeamsMessage {
  TopTeams top_teams = 1;
}