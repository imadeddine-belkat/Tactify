  int32 goals_conceded = 2;
  int32 own_goals = 3;
  int32 assists = 4;
  int32 shots = 5;
  int32 penalty_goals = 6;
  int32 penalties_taken = 7;
  int32 free_kick_goals = 8;
  int32 free_kick_shots = 9;
  int32 goals_from_inside_the_box = 10;
  int32 goals_from_outside_the_box = 11;
  int32 shots_from_inside_the_box = 12;
  int32 shots_from_outside_the_box = 13;
  int32 headed_goals = 14;
  int32 left_foot_goals = 15;
  int32 right_foot_goals = 16;
  int32 big_chances = 17;
  int32 big_chances_created = 18;
  int32 big_chances_missed = 19;
  int32 shots_on_target = 20;
  int32 shots_off_target = 21;
  int32 blocked_scoring_attempt = 22;
  int32 successful_dribbles = 23;
  int32 dribble_attempts = 24;
  int32 corners = 25;
  int32 hit_woodwork = 26;
  int32 fast_breaks = 27;
