syntax = "proto3";

package sofascore.v1;

option go_package = "github.com/imadeddine-belkat/tactify-protos/go/sofascore/v1;sofascorev1";

// =============================================================================
// Common Types
// =============================================================================

message Country {
  string name = 1;
  string alpha2 = 2;
  string alpha3 = 3;
}

message TeamColors {
  string primary = 1;
  string secondary = 2;
  string text = 3;
}

message PlayerColor {
  string primary = 1;
  string number = 2;
  string outline = 3;
  string fancy_number = 4;
}

message Status {
  int32 code = 1;
  string description = 2;
  string type = 3;
}

// =============================================================================
// Core Entities (Team, Player, Tournament)
// =============================================================================

message Team {
  int32 id = 1;
  string name = 2;
  string short_name = 3;
  string name_code = 4;
  Country country = 5;
  TeamColors team_colors = 6;
  Tournament tournament = 7;
  // Fields for Top Team Stats
  bool user_count = 8;
  string slug = 9;
  string gender = 10;
}

message Player {
  int32 id = 1;
  string name = 2;
  string short_name = 3;
  string position = 4;
  repeated string positions_detailed = 5;
  string jersey_number = 6;
  int32 height = 7;
  string preferred_foot = 8;
  Country country = 9;
  Team team = 10;
  int64 date_of_birth_timestamp = 11;
}

message LineupPlayer {
  int32 id = 1;
  string name = 2;
  string first_name = 3;
  string last_name = 4;
  string slug = 5;
  string short_name = 6;
  string position = 7;
  string jersey_number = 8;
  int32 height = 9;
  int32 user_count = 10;
  string gender = 11;
  string sofascore_id = 12;
  Country country = 13;
  string market_value_currency = 14;
  int64 date_of_birth_timestamp = 15;
  ProposedMarketValue proposed_market_value_raw = 16;
  FieldTranslations field_translations = 17;
}

message ProposedMarketValue {
  int32 value = 1;
  string currency = 2;
}

message FieldTranslations {
  map<string, string> name_translation = 1;
  map<string, string> short_name_translation = 2;
}

message Tournament {
  string name = 1;
  UniqueTournament unique_tournament = 2;
}

message UniqueTournament {
  int32 id = 1;
  string name = 2;
  LeagueCategory category = 3;
}

message LeagueCategory {
  int32 id = 1;
  string name = 2;
  string flag = 3;
}

message Season {
  int32 id = 1;
  string name = 2;
  string year = 3;
  bool is_current = 4;
}

message RoundInfo {
  int32 round = 1;
}

// =============================================================================
// Events & Leagues
// =============================================================================

message EventsPage {
  repeated Event events = 1;
  bool has_next_page = 2;
}

message Event {
  int32 id = 1;
  Tournament tournament = 2;
  Season season = 3;
  RoundInfo round_info = 4;
  Team home_team = 5;
  Team away_team = 6;
  Status status = 7;
  int64 start_timestamp = 8;
}

message LeagueCategories {
  repeated LeagueCategory categories = 1;
}

message LeagueUniqueTournaments {
  repeated UniqueTournamentGroups groups = 1;
}

message UniqueTournamentGroups {
  repeated UniqueTournament unique_tournaments = 1;
}

// =============================================================================
// Match Lineups
// =============================================================================

message MatchLineup {
  bool confirmed = 1;
  TeamLineup home = 2;
  TeamLineup away = 3;
}

message TeamLineup {
  repeated MatchPlayer players = 1;
  // SupportStaff is interface{} in Go, typically empty or complex, omitted for now
  string formation = 3;
  PlayerColor player_color = 4;
  PlayerColor goalkeeper_color = 5;
  repeated MissingPlayer missing_players = 6;
}

message MatchPlayer {
  Player player = 1;
  int32 team_id = 2;
  int32 shirt_number = 3;
  string jersey_number = 4;
  string position = 5;
  bool substitute = 6;
  bool captain = 7;
  PlayerStatistics statistics = 8;
}

message MissingPlayer {
  Player player = 1;
  string type = 2;
  int32 reason = 3;
  string description = 4;
  int32 external_type = 5;
  string expected_end_date = 6;
}

// =============================================================================
// Statistics (Match & Player)
// =============================================================================

message MatchStats {
  repeated MatchPeriods statistics = 1;
}

message MatchPeriods {
  string period = 1;
  repeated StatsGroup groups = 2;
}

message StatsGroup {
  string group_name = 1;
  repeated StatsItem statistics_items = 2;
}

message StatsItem {
  string key = 1;
  string name = 2;
  double home_value = 3;
  double away_value = 4;
  int32 compare_code = 5;
  optional int32 home_total = 6;
  optional int32 away_total = 7;
  string statistics_type = 8;
  int32 render_type = 9;
}

message PlayerStatistics {
  int32 minutes_played = 1;
  double rating = 2;
  int32 touches = 3;
  int32 total_pass = 4;
  int32 accurate_pass = 5;
  int32 total_long_balls = 6;
  int32 accurate_long_balls = 7;
  int32 accurate_own_half_passes = 8;
  int32 total_own_half_passes = 9;
  int32 accurate_opposition_half_passes = 10;
  int32 total_opposition_half_passes = 11;
  int32 total_cross = 12;
  int32 accurate_cross = 13;
  int32 key_pass = 14;
  int32 goal_assist = 15;
  int32 big_chance_created = 16;
  int32 total_shots = 17;
  int32 shot_off_target = 18;
  int32 on_target_scoring_attempt = 19;
  int32 blocked_scoring_attempt = 20;
  int32 hit_woodwork = 21;
  int32 goals = 22;
  int32 big_chance_missed = 23;
  double expected_goals = 24;
  double expected_goals_on_target = 25;
  double expected_assists = 26;
  int32 total_tackle = 27;
  int32 won_tackle = 28;
  int32 total_clearance = 29;
  int32 interception_won = 30;
  int32 outfielder_block = 31;
  int32 ball_recovery = 32;
  int32 duel_lost = 33;
  int32 duel_won = 34;
  int32 aerial_lost = 35;
  int32 aerial_won = 36;
  int32 total_contest = 37;
  int32 won_contest = 38;
  int32 challenge_lost = 39;
  int32 possession_lost_ctrl = 40;
  int32 unsuccessful_touch = 41;
  int32 dispossessed = 42;
  int32 fouls = 43;
  int32 was_fouled = 44;
  int32 total_offside = 45;
  int32 saves = 46;
  int32 total_keeper_sweeper = 47;
  int32 accurate_keeper_sweeper = 48;
  double keeper_save_value = 49;
  double goals_prevented = 50;
  int32 error_lead_to_a_shot = 51;
  int32 error_lead_to_a_goal = 52;
  double shot_value_normalized = 53;
  double pass_value_normalized = 54;
  double dribble_value_normalized = 55;
  double defensive_value_normalized = 56;
  double goalkeeper_value_normalized = 57;
  RatingVersions rating_versions = 58;
}

message RatingVersions {
  double original = 1;
  double alternative = 2;
}

message PlayerSeasonsStats {
  repeated PlayerSeasonStats seasons = 1;
}

message PlayerSeasonStats {
  int32 player_id = 1;
  string year = 2;
  int32 start_year = 3;
  string end_year = 4;
  Team team = 5;
  Season season = 6;
}

// Statistics summary usually found in Top Players lists
message AggregatedStatistics {
  int32 accurate_long_balls = 1;
  double accurate_long_balls_percentage = 2;
  int32 accurate_passes = 3;
  double accurate_passes_percentage = 4;
  int32 aerial_duels_won = 5;
  int32 assists = 6;
  int32 big_chances_created = 7;
  int32 big_chances_missed = 8;
  int32 blocked_shots = 9;
  int32 outfielder_blocks = 10;
  int32 clean_sheet = 11;
  int32 dribbled_past = 12;
  int32 error_lead_to_goal = 13;
  double expected_assists = 14;
  double expected_goals = 15;
  int32 goals = 16;
  int32 goals_assists_sum = 17;
  int32 goals_conceded = 18;
  int32 interceptions = 19;
  int32 key_passes = 20;
  int32 minutes_played = 21;
  int32 pass_to_assist = 22;
  double rating = 23;
  int32 red_cards = 24;
  int32 saves = 25;
  int32 shots_on_target = 26;
  int32 successful_dribbles = 27;
  int32 tackles = 28;
  int32 total_shots = 29;
  int32 yellow_cards = 30;
  int32 total_rating = 31;
  int32 count_rating = 32;
  int32 total_long_balls = 33;
  int32 total_passes = 34;
  int32 shots_from_inside_the_box = 35;
  int32 appearances = 36;
  string type = 37;
  int32 id = 38;
}

// =============================================================================
// Standings
// =============================================================================

message Standings {
  repeated Standing standings = 1;
}

message Standing {
  repeated StandingRow rows = 1;
}

message StandingRow {
  Team team = 1;
  int32 position = 2;
  int32 matches = 3;
  int32 wins = 4;
  int32 losses = 5;
  int32 draws = 6;
  int32 points = 7;
  int32 scores_for = 8;
  int32 scores_against = 9;
  string score_diff_formatted = 10;
}

// =============================================================================
// Team Roster
// =============================================================================

message TeamPlayers {
  repeated TeamPlayerItem players = 1;
}

message TeamPlayerItem {
  Player player = 1;
}

// =============================================================================
