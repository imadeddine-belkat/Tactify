syntax = "proto3";

package pl.v1;

option go_package = "github.com/imadeddine-belkat/tactify-protos/go/pl/v1;plv1";

// =============================================================================
// Standings
// =============================================================================

// One message per (team, season, scope). Scope is one of: overall, home, away.
// Maps to: team_standings table.
message TeamStanding {
  int32 team_code = 1;
  int32 season_code = 2;
  string scope = 3; // "overall" | "home" | "away"
  int32 position = 4;
  int32 played = 5;
  int32 won = 6;
  int32 drawn = 7;
  int32 lost = 8;
  int32 goals_for = 9;
  int32 goals_against = 10;
  int32 goal_difference = 11; // computed: goals_for - goals_against
  int32 points = 12;
}

